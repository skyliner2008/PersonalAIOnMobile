<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JARVIS Trading View</title>
    <style>
        :root {
            --tv-bg: #131722;
            --tv-text: #b2b5be;
            --tv-accent: #2962ff;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--tv-bg);
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        #chart {
            width: 100vw;
            height: 100vh;
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--tv-accent);
            font-weight: bold;
            font-size: 14px;
        }
        .attribution {
            position: fixed;
            right: 8px;
            bottom: 6px;
            z-index: 10;
            font-size: 10px;
            color: var(--tv-text);
            opacity: 0.75;
            background: rgba(19, 23, 34, 0.75);
            padding: 2px 6px;
            border-radius: 4px;
        }
        .attribution a {
            color: var(--tv-accent);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div id="chart"></div>
    <div id="loading" class="loading">Initializing JARVIS Engine...</div>
    <div class="attribution">Charts by <a href="https://www.tradingview.com/" target="_blank" rel="noopener noreferrer">TradingView</a></div>

    <!-- Load the library we just copied -->
    <script src="lightweight-charts.js"></script>
    <!-- Our custom logic will go here -->
    <script src="chart_engine.js"></script>
</body>
</html>
