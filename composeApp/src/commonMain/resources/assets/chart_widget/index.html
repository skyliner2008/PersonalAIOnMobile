<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JARVIS TradingView Widget</title>
    <style>
        :root {
            --bg: #131722;
            --text: #b2b5be;
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }
        #widget-root {
            width: 100%;
            height: 100%;
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 13px;
            opacity: 0.85;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div id="widget-root"></div>
<div id="loading" class="loading">Loading TradingView widget...</div>

<script>
    const intervalMap = {
        "1m": "1",
        "5m": "5",
        "15m": "15",
        "30m": "30",
        "1h": "60",
        "4h": "240",
        "1d": "D"
    };

    const state = {
        symbol: "OANDA:XAUUSD",
        interval: "15",
        theme: "dark",
        locale: "th_TH",
        hideSideToolbar: false
    };

    function toTvSymbol(input) {
        const symbol = (input || "").trim().toUpperCase().replace(/\s+/g, "");
        if (!symbol) return "OANDA:XAUUSD";
        if (symbol.includes(":")) return symbol;
        if (symbol === "XAUUSD" || symbol === "GOLD") return "OANDA:XAUUSD";
        if (symbol.endsWith("USDT")) return `BINANCE:${symbol}`;
        if (symbol.length === 6 && /^[A-Z]+$/.test(symbol)) return `OANDA:${symbol}`;
        return `NASDAQ:${symbol}`;
    }

    function toTvInterval(input) {
        const normalized = (input || "").trim().toLowerCase();
        return intervalMap[normalized] || "15";
    }

    function toLocale(input) {
        return (input || "").toLowerCase().startsWith("th") ? "th_TH" : "en";
    }

    function toBool(input, fallback = false) {
        if (typeof input === "boolean") return input;
        if (typeof input === "string") return input.toLowerCase() === "true";
        return fallback;
    }

    function renderWidget() {
        const root = document.getElementById("widget-root");
        const loading = document.getElementById("loading");
        root.innerHTML = "";

        const container = document.createElement("div");
        container.className = "tradingview-widget-container";
        container.style.width = "100%";
        container.style.height = "100%";

        const widget = document.createElement("div");
        widget.className = "tradingview-widget-container__widget";
        widget.style.width = "100%";
        widget.style.height = "100%";

        container.appendChild(widget);
        root.appendChild(container);

        const script = document.createElement("script");
        script.type = "text/javascript";
        script.async = true;
        script.src = "https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js";
        script.text = JSON.stringify({
            autosize: true,
            symbol: state.symbol,
            interval: state.interval,
            timezone: "Asia/Bangkok",
            theme: state.theme,
            style: "8",
            locale: state.locale,
            withdateranges: true,
            allow_symbol_change: true,
            calendar: false,
            details: false,
            hotlist: false,
            hide_volume: true,
            hide_side_toolbar: state.hideSideToolbar,
            hide_top_toolbar: false,
            hide_legend: false,
            save_image: true,
            backgroundColor: "#131722",
            gridColor: "rgba(42, 46, 57, 0.6)",
            watchlist: []
        });
        script.onload = () => {
            if (loading) loading.style.display = "none";
        };
        container.appendChild(script);
    }

    window.jarvisWidgetBridge = {
        setSymbol(symbol) {
            state.symbol = toTvSymbol(symbol);
            renderWidget();
        },
        setInterval(interval) {
            state.interval = toTvInterval(interval);
            renderWidget();
        },
        setSymbolAndInterval(symbol, interval) {
            state.symbol = toTvSymbol(symbol);
            state.interval = toTvInterval(interval);
            renderWidget();
        },
        setLocale(locale) {
            state.locale = toLocale(locale);
            renderWidget();
        },
        setHideSideToolbar(hidden) {
            state.hideSideToolbar = toBool(hidden, false);
            renderWidget();
        },
        setOptions(locale, hideSideToolbar) {
            state.locale = toLocale(locale);
            state.hideSideToolbar = toBool(hideSideToolbar, state.hideSideToolbar);
            renderWidget();
        },
        setAll(symbol, interval, locale, hideSideToolbar) {
            state.symbol = toTvSymbol(symbol);
            state.interval = toTvInterval(interval);
            state.locale = toLocale(locale);
            state.hideSideToolbar = toBool(hideSideToolbar, state.hideSideToolbar);
            renderWidget();
        }
    };

    window.onload = renderWidget;
</script>
</body>
</html>
